<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Diccionario Inverso</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-3">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="{{ url_for('static', filename='img/logo_diccionario.png') }}" alt="Diccionario Inverso" height="70"
          class="d-inline-block align-text-top">
      </a>
      <div class="ms-auto d-flex align-items-center">
        <div id="userDisplayContainer" class="user-capsule">
          <span id="userDisplay" class="text-white">
            <i class="bi bi-person-circle me-1"></i> Usuario Anónimo
          </span>
        </div>
        <a id="logoutBtn" href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm ms-2"
          style="display: none;">Cerrar sesión</a>
      </div>
    </div>
  </nav>
  <div class="container-fluid">
    {% block content %}{% endblock %}
  </div>

  <button id="themeToggle"
    class="btn btn-dark rounded-circle position-fixed bottom-0 end-0 m-4 shadow d-flex align-items-center justify-content-center"
    style="width: 50px; height: 50px; z-index: 1050;" title="Alternar tema">
    <i class="bi bi-moon-stars fs-5"></i>
  </button>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
